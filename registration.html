<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./registration.css">
</head>
<body>
    <div class="card">
        <h2>Create Account</h2>
        <p>Please fill in your details to register</p>
        <form id="formContainer">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Luffy" required>
            </div>
            <div class="form-group">
                <label for="name">Email Address</label>
                <input type="email" id="email" placeholder="luffy@gamil.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="text" id="password" placeholder="********" required>
            </div>
            <div class="form-group">
                <label for="mobile">Mobile Number</label>
                <input type="tel" id="mobile" placeholder="+91 987 564 1203" required>
            </div>
            <button type="submit" class="submit-btn">Register</button>
        </form>
   

    <div class="footer-text">
        <p>Already have an account ? <a href="../Login/login.html">Sign In</a></p>
        ©2026 Your Company. All Rights Reserved..
    </div>
    </div>
    <script src="./registration.js" defer></script> 
</body>
</html>
